    <!-- Dashed inner stitching -->
    <path d="M 178 572 Q 178 532 218 532 L 806 532 Q 846 532 846 572 L 846 798 Q 846 820 824 830 L 575 880 Q 512 896 449 880 L 200 830 Q 178 820 178 798 Z"
