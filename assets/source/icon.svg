    <!-- Brand text inside pocket -->
    <g font-family="Helvetica, Arial, sans-serif" font-weight="900" fill="#4A9D4A" text-anchor="middle">
      <text x="512" y="708" font-size="92">Pocket Cash</text>
      <text x="512" y="820" font-size="92">Calculator</text>
    </g>
