    <rect x="-150" y="-230" width="300" height="460" rx="30"
          fill="#6FCB6F" stroke="#173B5F" stroke-width="22" stroke-linejoin="round"/>
    <rect x="-128" y="-208" width="256" height="416" rx="20"
          fill="none" stroke="#173B5F" stroke-width="6" opacity="0.45"/>
    <circle cx="-100" cy="-180" r="32" fill="none" stroke="#173B5F" stroke-width="10" opacity="0.6"/>
    <circle cx="100" cy="-180" r="32" fill="none" stroke="#173B5F" stroke-width="10" opacity="0.6"/>
    <circle cx="0" cy="-40" r="62" fill="#A6E1A6" stroke="#173B5F" stroke-width="10"/>
    <g transform="translate(0 -40) scale(1.8)" fill="#173B5F">
      <path d="M-2,-22 L2,-22 L2,-17 C8,-16 12,-12 13,-7 L7,-7 C6,-10 4,-11 0,-11 L-2,-11 C-5,-11 -7,-9 -7,-6 C-7,-3 -5,-2 -1,-1 L3,1 C10,3 13,6 13,12 C13,17 9,20 2,21 L2,26 L-2,26 L-2,21 C-9,20 -13,16 -14,10 L-8,10 C-7,13 -5,15 -1,15 L2,15 C6,15 8,13 8,10 C8,7 6,6 1,4 L-3,3 C-9,1 -12,-1 -12,-7 C-12,-12 -8,-15 -2,-17 Z"/>
    </g>
  </g>

